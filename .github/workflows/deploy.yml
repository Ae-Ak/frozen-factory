name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Create deployment package
        run: |
          mkdir -p deploy-pkg
          cp -r .next deploy-pkg/
          cp -r public deploy-pkg/
          cp package.json deploy-pkg/
          cp next.config.ts deploy-pkg/
          ls -lh deploy-pkg/

      - name: Deploy to Hostinger
        uses: burnett01/rsync-deployments@5.2
        with:
          switches: -avz
          path: deploy-pkg/
          remote_path: ~/domains/sandybrown-lapwing-903015.hostingersite.com/
          remote_host: ${{ secrets.HOSTINGER_SSH_HOST }}
          remote_port: ${{ secrets.HOSTINGER_SSH_PORT }}
          remote_user: ${{ secrets.HOSTINGER_SSH_USER }}
          remote_key: ${{ secrets.HOSTINGER_SSH_KEY }}
