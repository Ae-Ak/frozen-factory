name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            echo "=== DEBUG: Finding npm ==="
            which npm || echo "npm not found in PATH"
            find ~ -name npm -type f 2>/dev/null | head -5

            echo "=== DEBUG: Checking PATH ==="
            echo $PATH

            echo "=== DEBUG: Node.js location ==="
            find ~ -name "node" -type f 2>/dev/null | grep -E "bin/node$" | head -3

            echo "=== Deploying to Hostinger ==="
            DEPLOY_DIR=~/domains/sandybrown-lapwing-903015.hostingersite.com

            if [ -d "$DEPLOY_DIR/.git" ]; then
              echo "✅ Git repo found, pulling latest changes..."
              cd "$DEPLOY_DIR"
              git pull origin main
            else
              echo "⚠️  No git repo found, cloning repository..."
              rm -rf "$DEPLOY_DIR"
              git clone https://github.com/Ae-Ak/frozen-factory.git "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
            fi

            echo "✅ Deployment erfolgreich!"
