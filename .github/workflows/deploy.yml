name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            echo "=== DEBUG INFO ==="
            pwd
            ls -la ~/
            echo "=== Checking for frozen-factory ==="
            find ~ -name "frozen-factory" -type d 2>/dev/null | head -5
            echo "=== Current directory contents ==="
            ls -la
            echo "=== Deploying ==="
            if [ -d ~/public_html/frozen-factory ]; then
              cd ~/public_html/frozen-factory
            elif [ -d ~/frozen-factory ]; then
              cd ~/frozen-factory
            else
              echo "ERROR: frozen-factory directory not found!"
              exit 1
            fi
            pwd
            git pull origin main
            npm install --production
            npm run build
            echo "✅ Deployment erfolgreich!"
