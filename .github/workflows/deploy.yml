name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@5.2
        with:
          switches: -avz --delete
          path: .next/
          remote_path: ~/domains/sandybrown-lapwing-903015.hostingersite.com/.next/
          remote_host: ${{ secrets.HOSTINGER_SSH_HOST }}
          remote_port: ${{ secrets.HOSTINGER_SSH_PORT }}
          remote_user: ${{ secrets.HOSTINGER_SSH_USER }}
          remote_key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Deploy public folder
        uses: burnett01/rsync-deployments@5.2
        with:
          switches: -avz --delete
          path: public/
          remote_path: ~/domains/sandybrown-lapwing-903015.hostingersite.com/public/
          remote_host: ${{ secrets.HOSTINGER_SSH_HOST }}
          remote_port: ${{ secrets.HOSTINGER_SSH_PORT }}
          remote_user: ${{ secrets.HOSTINGER_SSH_USER }}
          remote_key: ${{ secrets.HOSTINGER_SSH_KEY }}
