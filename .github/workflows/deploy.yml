name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            echo "=== DEBUG INFO ==="
            pwd
            ls -la ~/
            echo "=== Checking domains ==="
            ls -la ~/domains/
            echo "=== Looking for deployment location ==="
            find ~/domains -name ".git" -type d 2>/dev/null | head -5
            echo "=== Deploying ==="
            cd ~/domains/sandybrown-lapwing-903015.hostingersite.com/ 2>/dev/null || cd ~/public_html/frozen-factory 2>/dev/null || (echo "ERROR: Website directory not found!"; exit 1)
            pwd
            git pull origin main
            npm install --production
            npm run build
            echo "✅ Deployment erfolgreich!"
